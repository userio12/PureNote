name: purenote
description: "A minimal, fast note-taking app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Rich text
  flutter_quill: ^11.5.0

  # Navigation
  go_router: ^14.8.1

  # Encryption & security
  encrypt: ^5.0.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4

  # Notifications & background
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0

  # File handling
  file_picker: ^8.1.7
  open_filex: ^4.5.0
  share_plus: ^10.1.4

  # Audio
  record: ^6.1.2

  # Widget
  home_widget: ^0.9.0

  # Links
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  package_info_plus: ^9.0.0

  # Crash reporting
  sentry_flutter: ^9.0.0

  # Import parsing
  xml: ^6.5.0
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
