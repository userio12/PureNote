name: Flutter Debug Build (arm64-v8a)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK (arm64-v8a)
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --debug --target-platform android-arm64 2>&1 | tee build_log.txt
          echo "APK_OUTPUT=$(ls build/app/outputs/flutter-apk/)" >> "$GITHUB_ENV"

      - name: Report Build Failure
        if: failure()
        shell: bash
        run: |
          echo "### ❌ Build Failed" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 50 build_log.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Report Build Success
        if: success()
        shell: bash
        run: |
          echo "### ✅ Build Successful" >> "$GITHUB_STEP_SUMMARY"
          echo "Files in output: $APK_OUTPUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Build Log (Always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_log.txt

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-arm64-v8a
          path: build/app/outputs/flutter-apk/*.apk
